name: CI

on:
  push:
    branches:
      - master
  pull_request:

env:
  PYTHON_VERSION: "3.13"

jobs:
  linting:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Installing Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: yezz123/setup-uv@v4
        with:
          uv-venv: ".venv"

      - name: Cache uv virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-uv-${{ env.PYTHON_VERSION }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-${{ env.PYTHON_VERSION }}-

      - name: Install linting dependencies
        run: uv sync --extra lint

      - name: Checking linting with ruff
        run: ruff check .

      - name: Checking formatting with ruff
        run: ruff format .

  testing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Installing Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: yezz123/setup-uv@v4
        with:
          uv-venv: ".venv"

      - name: Cache uv virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-uv-${{ env.PYTHON_VERSION }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        run: uv sync --extra test

      - name: Run tests with pytest and coverage
        run: |
          set +e
          coverage run -m pytest -v .
          PYTEST_EXIT_CODE=$?
          set -e
          if [ $PYTEST_EXIT_CODE -eq 0 ]; then
            coverage report -m --fail-under=80
          elif [ $PYTEST_EXIT_CODE -eq 5 ]; then
            echo "No tests found. Skipping coverage report."
          else
            exit $PYTEST_EXIT_CODE
          fi

  build_docker_images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build sample Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: false
